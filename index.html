<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahoo! 奇摩即時通 - 完整版</title>
<style>
    /* ================= 基礎設定 ================= */
    body {
        background-color: #e6e6fa; 
        font-family: 'Tahoma', 'PMingLiU', '微軟正黑體', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        gap: 20px; /* 視窗之間的間距 */
    }

    /* 視窗共通外觀 */
    .window {
        background-color: #f0f0f0;
        border: 1px solid #7B0099;
        border-radius: 5px 5px 0 0;
        box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .title-bar {
        background: linear-gradient(to bottom, #9b59b6, #7B0099);
        color: white;
        padding: 5px 10px;
        font-size: 13px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #5a0073;
    }
    .window-controls span { margin-left: 8px; cursor: pointer; }
    .window-controls span:hover { color: #ffcc00; }

    .menu-bar { background-color: #ece9d8; padding: 3px 10px; font-size: 12px; border-bottom: 1px solid #ccc; }
    .menu-bar span { margin-right: 15px; cursor: pointer; }
    .menu-bar span:hover { background-color: #316ac5; color: white; }

    .btn { background-color: #e0e0e0; border: 2px outset #ccc; padding: 5px 15px; cursor: pointer; font-family: inherit; font-size: 12px; }
    .btn:active { border: 2px inset #ccc; }

    /* ================= 登入畫面 ================= */
    #login-window { width: 350px; }
    .login-header { background-color: white; text-align: center; padding: 25px 0; border-bottom: 2px solid #ffcc00; }
    .y-logo { color: #7B0099; font-size: 28px; font-weight: bold; font-style: italic; font-family: 'Arial Black', sans-serif; letter-spacing: -1px; }
    .y-logo span { color: #ff0000; }
    .login-body { background-color: #ece9d8; padding: 20px 30px; font-size: 13px; }
    .input-group { display: flex; margin-bottom: 10px; align-items: center; }
    .input-group label { width: 90px; }
    .input-group input { flex-grow: 1; padding: 4px; border: 1px inset #ccc; }
    .checkbox-group { margin-left: 90px; margin-top: 10px; display: flex; flex-direction: column; gap: 5px; font-size: 12px; }
    .login-actions { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }

    /* ================= 好友名單 (主視窗) ================= */
    #main-window { width: 280px; height: 550px; display: none; }
    
    .my-profile { display: flex; padding: 10px; background-color: white; border-bottom: 1px solid #ccc; align-items: center; }
    .my-avatar { width: 50px; height: 50px; background-color: #eee; border: 1px solid #999; margin-right: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; }
    .my-info .name { font-weight: bold; font-size: 14px; color: #333; }
    .my-info select { margin-top: 5px; font-size: 11px; padding: 2px; width: 100%; border: 1px solid #ccc; }

    .search-bar { padding: 5px; background-color: #ece9d8; border-bottom: 1px solid #ccc; }
    .search-bar input { width: 95%; padding: 3px; font-size: 12px; border: 1px inset #ccc; }

    .buddy-list { flex-grow: 1; background-color: white; overflow-y: auto; padding: 5px; font-size: 13px; }
    .group-header { font-weight: bold; color: #555; cursor: pointer; padding: 5px; background-color: #f9f9f9; border: 1px solid #eee; margin-top: 5px; }
    .group-header:hover { background-color: #eef; }
    
    .contact-item { display: flex; align-items: center; padding: 5px 10px; cursor: pointer; }
    .contact-item:hover { background-color: #316ac5; color: white; }
    .contact-item:hover .status { color: #ddd; }
    .status-icon { color: #ffcc00; margin-right: 8px; font-size: 14px; }
    .contact-name { font-weight: bold; }
    .status { font-size: 11px; color: #888; margin-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ================= 聊天畫面 ================= */
    #chat-window { width: 450px; display: none; }
    .chat-header { display: flex; padding: 10px; background-color: white; border-bottom: 1px solid #ccc; align-items: center; }
    .avatar { width: 48px; height: 48px; background-color: #ffd700; border: 1px solid #999; border-radius: 3px; margin-right: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; }
    .contact-info .name { font-size: 14px; font-weight: bold; color: #333; }
    .contact-info .status { font-size: 12px; color: #666; margin-top: 3px; }

    .chat-history { height: 250px; background-color: white; padding: 10px; overflow-y: auto; font-size: 13px; border-bottom: 1px inset #ccc; }
    .message { margin-bottom: 8px; line-height: 1.4; }
    .sender { color: #0000FF; font-weight: bold; }
    .me { color: #800080; font-weight: bold; }
    .system { color: #FF0000; font-weight: bold; font-style: italic; }
    .timestamp { color: #999; font-size: 11px; margin-left: 5px; }

    .toolbar { background-color: #ece9d8; padding: 5px; display: flex; gap: 5px; border-bottom: 1px solid #ccc; }
    .toolbar button { background-color: transparent; border: 1px solid transparent; cursor: pointer; font-size: 12px; padding: 2px 5px; }
    .toolbar button:hover { border: 1px outset #ccc; background-color: #e0e0e0; }
    .buzz-btn { color: #7B0099; font-weight: bold; }

    .input-area { display: flex; background-color: white; padding: 5px; }
    textarea { flex-grow: 1; height: 50px; border: none; resize: none; font-family: inherit; font-size: 13px; padding: 5px; outline: none; }
    .send-controls { display: flex; flex-direction: column; justify-content: flex-end; padding-left: 5px; }

    /* 震動動畫 */
    @keyframes shake {
        0%, 30%, 60%, 90% { transform: translate(2px, 1px) rotate(0deg); }
        10%, 50%, 80%, 100% { transform: translate(-1px, -2px) rotate(-1deg); }
        20%, 70% { transform: translate(-3px, 0px) rotate(1deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
    }
    .buzzing { animation: shake 0.4s; animation-iteration-count: 2; }
</style>
</head>
<body>

<audio id="audio-login" src="https://actions.google.com/sounds/v1/water/glass_water_pour.ogg" preload="auto"></audio>
<audio id="audio-buzz" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" preload="auto"></audio>

<div class="window" id="login-window">
    <div class="title-bar">
        <span>Yahoo! 奇摩即時通</span>
        <div class="window-controls"><span onclick="closeApp()">X</span></div>
    </div>
    <div class="login-header">
        <div class="y-logo">YAHOO!<span>!</span><br><span style="font-size: 14px; font-family: Tahoma; color: #666; font-style: normal; font-weight: normal; letter-spacing: 0;">奇摩即時通</span></div>
    </div>
    <div class="login-body">
        <div class="input-group">
            <label>Yahoo! 帳號:</label>
            <input type="text" value="my_account_123">
        </div>
        <div class="input-group">
            <label>密碼:</label>
            <input type="password" value="password">
        </div>
        <div class="checkbox-group">
            <label><input type="checkbox" checked> 記住我的密碼</label>
            <label><input type="checkbox"> 自動登入</label>
        </div>
        <div class="login-actions">
            <button class="btn" onclick="doLogin()">登入(S)</button>
        </div>
    </div>
</div>

<div class="window" id="main-window">
    <div class="title-bar">
        <span>Yahoo! 奇摩即時通</span>
        <div class="window-controls"><span>_</span><span onclick="closeApp()">X</span></div>
    </div>
    <div class="menu-bar">
        <span>即時通(Y)</span><span>聯絡人(C)</span><span>動作(A)</span><span>說明(H)</span>
    </div>
    
    <div class="my-profile">
        <div class="my-avatar">😎</div>
        <div class="my-info">
            <div class="name">我的帳號 (my_account_123)</div>
            <select>
                <option>✅ 上線</option>
                <option>⏳ 離開</option>
                <option>⛔ 忙碌中</option>
                <option>👻 隱身</option>
            </select>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="尋找聯絡人...">
    </div>

    <div class="buddy-list">
        <div class="group-header">▼ 死黨麻吉 (1/2)</div>
        <div class="contact-item" ondblclick="openChat('煞氣a小明', '無名相簿更新囉，密碼一樣~~~ ^_<', '👦')">
            <span class="status-icon">☻</span>
            <span class="contact-name">煞氣a小明</span>
            <span class="status">- 無名相簿更新囉...</span>
        </div>
        <div class="contact-item" style="opacity: 0.5;">
            <span class="status-icon" style="color:#aaa;">☻</span>
            <span class="contact-name">水樹洞ICU分院長</span>
            <span class="status">(離線)</span>
        </div>

        <div class="group-header">▼ 國中同學 (2/5)</div>
        <div class="contact-item" ondblclick="openChat('檸檬羊', '準備開台囉！', '🐑')">
            <span class="status-icon">☻</span>
            <span class="contact-name">檸檬羊</span>
            <span class="status">- 準備開台囉！</span>
        </div>
        <div class="contact-item" ondblclick="openChat('瓦斯超人', '守護世界的和平！', '🦸‍♂️')">
            <span class="status-icon">☻</span>
            <span class="contact-name">瓦斯超人</span>
            <span class="status">- 守護世界的和平！</span>
        </div>
    </div>
</div>

<div class="window" id="chat-window">
    <div class="title-bar">
        <span id="chat-title">與 煞氣a小明 聊天中</span>
        <div class="window-controls"><span onclick="closeChat()">X</span></div>
    </div>
    <div class="menu-bar">
        <span>檔案(F)</span><span>編輯(E)</span><span>檢視(V)</span><span>朋友(P)</span>
    </div>
    <div class="chat-header">
        <div class="avatar" id="chat-avatar">👦</div>
        <div class="contact-info">
            <div class="name" id="chat-name">煞氣a小明</div>
            <div class="status" id="chat-status">無名相簿更新囉，密碼一樣~~~ ^_&lt;</div>
        </div>
    </div>
    <div class="chat-history" id="chat-history">
        </div>
    <div class="toolbar">
        <button>B</button><button>I</button><button>U</button>
        <button>😀</button>
        <button class="buzz-btn" onclick="sendBuzz()">🔔 叮咚！</button>
    </div>
    <div class="input-area">
        <textarea id="message-input" placeholder="輸入訊息..."></textarea>
        <div class="send-controls">
            <button class="btn" onclick="sendMessage()">傳送</button>
        </div>
    </div>
</div>

<script>
    let currentChatUser = "";

    function getTimeString() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return hours + ':' + minutes + ' ' + ampm;
    }

    // 1. 執行登入
    function doLogin() {
        document.getElementById('login-window').style.display = 'none';
        document.getElementById('main-window').style.display = 'flex';
        
        const loginAudio = document.getElementById('audio-login');
        loginAudio.volume = 0.5;
        loginAudio.play().catch(e => console.log('音效播放失敗'));
    }

    // 2. 開啟聊天視窗 (雙擊聯絡人觸發)
    function openChat(name, status, avatar) {
        currentChatUser = name;
        document.getElementById('chat-title').innerText = `與 ${name} 聊天中`;
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-status').innerText = status;
        document.getElementById('chat-avatar').innerText = avatar;
        
        const chatHistory = document.getElementById('chat-history');
        chatHistory.innerHTML = `
            <div class="message">
                <span class="system">*** 您已經建立與 ${name} 的連線 ***</span>
            </div>
            <div class="message">
                <span class="sender">${name}:</span> 
                <span>安安，你在嗎？</span>
                <span class="timestamp">${getTimeString()}</span>
            </div>
        `;
        
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('message-input').focus();
    }

    // 關閉聊天視窗
    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
    }

    // 關閉整個程式 (偷懶的做法：重整頁面)
    function closeApp() {
        location.reload();
    }

    // 3. 傳送訊息
    function sendMessage() {
        const input = document.getElementById('message-input');
        const messageText = input.value.trim();
        const chatHistory = document.getElementById('chat-history');

        if (messageText !== '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <span class="me">我:</span> 
                <span>${messageText}</span>
                <span class="timestamp">${getTimeString()}</span>
            `;
            chatHistory.appendChild(msgDiv);
            input.value = ''; 
            chatHistory.scrollTop = chatHistory.scrollHeight; 
        }
    }

    // Enter 鍵傳送
    document.getElementById('message-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 4. 叮咚功能
    function sendBuzz() {
        const win = document.getElementById('chat-window');
        const chatHistory = document.getElementById('chat-history');
        const buzzAudio = document.getElementById('audio-buzz');
        
        buzzAudio.currentTime = 0;
        buzzAudio.play().catch(e => console.log('音效播放失敗'));

        win.classList.remove('buzzing');
        void win.offsetWidth; 
        win.classList.add('buzzing');

        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        msgDiv.innerHTML = `
            <span class="system"><< 你傳送了一個「叮咚！」給 ${currentChatUser} >></span>
            <span class="timestamp">${getTimeString()}</span>
        `;
        chatHistory.appendChild(msgDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
</script>

</body>
</html>
